name: Release Branch (tag)

# Git Flow (ADR-013, docs/Decisions.md): cuando un PR se mergea hacia una
# rama release/*, se taguea esa versión como release candidate. Un solo
# entorno de Firebase: el deploy real solo ocurre con push a main
# (deploy-firebase.yml), nunca desde release/* ni develop. Este workflow
# no repite tests: ya corrieron como parte del PR (backend.yml/web.yml/
# android.yml se disparan en cualquier pull_request).

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

concurrency:
  group: release-branch-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Crear tag de la release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Derivar versión desde la rama release/*
        id: version
        run: |
          version="${{ github.event.pull_request.base.ref }}"
          version="${version#release/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Crear y pushear tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}-rc" \
            -m "Release candidate ${{ steps.version.outputs.version }} (${{ github.event.pull_request.base.ref }})"
          git push origin "v${{ steps.version.outputs.version }}-rc"

      - name: Crear GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-rc
          name: v${{ steps.version.outputs.version }}-rc
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.event.pull_request.base.ref }}
