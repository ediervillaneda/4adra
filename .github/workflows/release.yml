name: Release

# Git Flow (ADR-013, docs/Decisions.md): un push a release/* corre toda la
# batería de tests y, si pasan, publica automáticamente a main (tag + GitHub
# Release) y sincroniza develop. Nunca se mergea a mano a main.

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-backend:
    uses: ./.github/workflows/backend.yml

  test-web:
    uses: ./.github/workflows/web.yml

  test-android:
    uses: ./.github/workflows/android.yml

  publish:
    name: Publicar a main y develop
    needs: [test-backend, test-web, test-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derivar nombre de versión desde la rama
        id: version
        run: |
          ref_name="${GITHUB_REF#refs/heads/}"
          version="${ref_name#release/}"
          version="${version#hotfix/}"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configurar identidad de git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Mergear a main y taguear
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff "origin/${{ steps.version.outputs.ref_name }}" \
            -m "release: ${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" \
            -m "Release ${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Sincronizar develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge --no-ff "origin/${{ steps.version.outputs.ref_name }}" \
            -m "chore: sincronizar develop tras release ${{ steps.version.outputs.version }}"
          git push origin develop

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
