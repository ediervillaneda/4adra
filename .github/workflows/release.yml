name: Release

# Git Flow (ADR-013, docs/Decisions.md), ciclo de vida completo de release/hotfix:
#
# 1. Push a release/**|hotfix/** -> corre CI completo (backend/web/android) y,
#    si pasa y hay commits nuevos vs main, publica automáticamente a main
#    (vía Pull Request real, nunca push directo) y sincroniza develop. Taguea
#    v<version> y crea el GitHub Release.
# 2. PR mergeado hacia release/** (fixes de estabilización) -> taguea
#    v<version>-rc y crea un GitHub Release (prerelease). No repite tests,
#    ya corrieron como parte del PR.
#
# Un solo entorno de Firebase: el deploy real solo ocurre con push a main
# (deploy-firebase.yml), nunca desde release/*, hotfix/* ni develop.

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

concurrency:
  group: release-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  test-backend:
    if: github.event_name == 'push'
    uses: ./.github/workflows/backend.yml

  test-web:
    if: github.event_name == 'push'
    uses: ./.github/workflows/web.yml

  test-android:
    if: github.event_name == 'push'
    uses: ./.github/workflows/android.yml

  publish:
    name: Publicar a main y develop
    if: github.event_name == 'push'
    needs: [test-backend, test-web, test-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derivar nombre de versión desde la rama
        id: version
        run: |
          ref_name="${GITHUB_REF#refs/heads/}"
          version="${ref_name#release/}"
          version="${version#hotfix/}"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verificar que hay commits nuevos vs main
        id: guard
        run: |
          git fetch origin main
          ahead=$(git rev-list --count origin/main..HEAD)
          if [ "$ahead" -eq 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.version.outputs.ref_name }} no tiene commits nuevos respecto a main todavía (recién cortada). Se omite la publicación hasta que reciba el merge de develop."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir y mergear PR hacia main
        if: steps.guard.outputs.ready == 'true'
        run: |
          existing=$(gh pr list --base main --head "${{ steps.version.outputs.ref_name }}" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create --base main --head "${{ steps.version.outputs.ref_name }}" \
              --title "release: ${{ steps.version.outputs.version }}" \
              --body "Publicación automática de \`${{ steps.version.outputs.ref_name }}\` a \`main\` (ADR-013)."
          fi
          gh pr merge "${{ steps.version.outputs.ref_name }}" --merge

      - name: Taguear main
        if: steps.guard.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git tag -a "v${{ steps.version.outputs.version }}" origin/main \
            -m "Release ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Abrir y mergear PR de sincronización hacia develop
        if: steps.guard.outputs.ready == 'true'
        run: |
          existing=$(gh pr list --base develop --head "${{ steps.version.outputs.ref_name }}" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create --base develop --head "${{ steps.version.outputs.ref_name }}" \
              --title "chore: sincronizar develop tras release ${{ steps.version.outputs.version }}" \
              --body "Sincronización automática de \`${{ steps.version.outputs.ref_name }}\` a \`develop\` tras publicar a \`main\` (ADR-013)."
          fi
          gh pr merge "${{ steps.version.outputs.ref_name }}" --merge

      - name: Crear GitHub Release
        if: steps.guard.outputs.ready == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

  tag-candidate:
    name: Crear tag de release candidate
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Derivar versión desde la rama release/*
        id: version
        run: |
          version="${{ github.event.pull_request.base.ref }}"
          version="${version#release/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Crear y pushear tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}-rc" \
            -m "Release candidate ${{ steps.version.outputs.version }} (${{ github.event.pull_request.base.ref }})"
          git push origin "v${{ steps.version.outputs.version }}-rc"

      - name: Crear GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-rc
          name: v${{ steps.version.outputs.version }}-rc
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.event.pull_request.base.ref }}
