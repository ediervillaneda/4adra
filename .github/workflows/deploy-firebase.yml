name: Deploy Firebase (Production)

# Git Flow (ADR-013, docs/Decisions.md): el único disparador de un deploy real
# es un push a main, y a main solo llega código vía release.yml (release/* o
# hotfix/*) — nunca un push manual. Requiere los secrets FIREBASE_SERVICE_ACCOUNT
# y FIREBASE_PROJECT_ID_PRODUCTION; mientras no existan (proyecto Firebase
# production todavía no creado, ver docs/checklists/Fase0-FundacionTecnica.md),
# el job se omite sin fallar, siguiendo el mismo patrón de guardas que el resto
# de los workflows de este repo.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - '.github/workflows/deploy-firebase.yml'

concurrency:
  group: deploy-firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build y deploy a Firebase (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar secrets y scaffolding requeridos
        id: guard
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ] || [ -z "${{ secrets.FIREBASE_PROJECT_ID_PRODUCTION }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Faltan los secrets FIREBASE_SERVICE_ACCOUNT/FIREBASE_PROJECT_ID_PRODUCTION (proyecto Firebase production aún no creado). Se omite el deploy."
          elif [ ! -f backend/package.json ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::backend/package.json no existe todavía. Se omite el deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar Node.js
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: backend/.nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias y build
        if: steps.guard.outputs.ready == 'true'
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Autenticar con Google Cloud
        if: steps.guard.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install -g firebase-tools

      - name: Deploy (Cloud Functions, Firestore rules/indexes, Storage rules)
        if: steps.guard.outputs.ready == 'true'
        run: |
          firebase deploy \
            --only functions,firestore:rules,firestore:indexes,storage \
            --project "${{ secrets.FIREBASE_PROJECT_ID_PRODUCTION }}" \
            --non-interactive
